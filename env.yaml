# Environment Variables for Cloud Run Deployment
# values should be strings
env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "8080"
  
  # Database (Required)
  - name: DATABASE_URL
    value: "postgresql://user:password@hostname:5432/dbname"

  # Stripe (Required)
  - name: STRIPE_SECRET_KEY
    value: "sk_live_..."
  - name: STRIPE_PUBLISHABLE_KEY
    value: "pk_live_..."
  - name: STRIPE_WEBHOOK_SECRET
    value: "whsec_..."

  # Email (Required)
  - name: EMAIL_PROVIDER
    value: "sendgrid" # or mailgun, ses
  - name: EMAIL_API_KEY
    value: "your_api_key"
  - name: EMAIL_FROM
    value: "orders@fallsorigin.coffee"
  - name: ADMIN_EMAIL
    value: "admin@fallsorigin.coffee"

  # Admin Security (Required)
  - name: ADMIN_PASSWORD_HASH
    value: "$2b$10$..." # Generate with: node -e "console.log(require('bcrypt').hashSync('password', 10))"
  
  # Delivery (Required)
  - name: GEOCODING_PROVIDER
    value: "google" # or opencage
  - name: GEOCODING_API_KEY
    value: "your_api_key"
  - name: BASE_CITY
    value: "Toronto, Ontario, Canada"
  - name: BASE_LAT
    value: "43.6532"
  - name: BASE_LNG
    value: "-79.3832"
  - name: DELIVERY_RADIUS_KM
    value: "200"

  # Cloud Run specific
  - name: TRUST_PROXY
    value: "true"
